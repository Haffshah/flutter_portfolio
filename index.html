    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            /* Monochrome Gold Theme - Pure Black */
            color: #D4AF37;
            /* Metallic Gold */
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .loading-container {
            position: relative;
            width: 80px;
            height: 80px;
        }

        /* Outer Ring - Gold */
        .loader-track {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 4px solid rgba(212, 175, 55, 0.15);
            /* Gold faint track */
        }

        .loader-ring {
            position: absolute;
            inset: 0;
            border: 4px solid transparent;
            border-top-color: #D4AF37;
            /* Metallic Gold */
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        /* Inner Ring - Bright Gold */
        .inner-track {
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            border-radius: 50%;
            border: 3px solid rgba(255, 215, 0, 0.15);
            /* Bright Gold faint track */
        }

        .inner-ring {
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            border: 3px solid transparent;
            border-top-color: #FFD700;
            /* Bright Gold */
            border-radius: 50%;
            animation: spin 1.5s linear infinite reverse;
        }

        /* Center Dot - Gold */
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background-color: #D4AF37;
            /* Metallic Gold */
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Light Mode - White background with Gold accents */
        @media (prefers-color-scheme: light) {
            body {
                background-color: #FFFFFF;
                /* Pure White */
                color: #000000;
                /* Black text */
            }

            .loader-track {
                border: 4px solid rgba(212, 175, 55, 0.2);
            }

            .inner-track {
                border: 3px solid rgba(255, 215, 0, 0.2);
            }

            .center-dot {
                background-color: #D4AF37;
                box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
            }
        }
    </style>

<div class="loading-container">
    <div class="loader-track"></div>
    <div class="loader-ring"></div>
    <div class="inner-track"></div>
    <div class="inner-ring"></div>
    <div class="center-dot"></div>
</div>
<script>
    // Immediate theme check to prevent flash of wrong color
    if (window.matchMedia) {
        const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.body.style.backgroundColor = isDarkMode ? '#000000' : '#FFFFFF';

        // Update on change
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            const newColorScheme = event.matches ? "dark" : "light";
            document.body.style.backgroundColor = (newColorScheme === "dark") ? '#000000' : '#FFFFFF';
        });
    }

    // Clear stale Flutter service-worker/cache from previous deploys
    (async function clearStaleFlutterCache() {
        try {
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                await Promise.all(registrations.map((registration) => registration.unregister()));
            }
            if (window.caches) {
                const keys = await caches.keys();
                await Promise.all(keys.map((key) => caches.delete(key)));
            }
        } catch (_) {
            // Ignore cache cleanup failures
        }
    })();

    // HTML loader must be removed once Flutter paints its first frame
    window.addEventListener('flutter-first-frame', function () {
        const loader = document.querySelector('.loading-container');
        if (loader) loader.remove();
    });
</script>
